# Nginx: App Store support URL at /support
#
# Prereq: HTML on disk (same as repo web/support.html):
#   /var/www/octobetiq/support.html
#
# Copy from repo (on server):
#   sudo cp ~/sport_prediction/web/support.html /var/www/octobetiq/
#
# IMPORTANT: If apex (octobetiq.com) 301-redirects to www, repeat this block in the
# server{} that handles https://www.octobetiq.com — App Store may use either host.

location = /support {
    root /var/www/octobetiq;
    rewrite ^ /support.html break;
    default_type text/html;
}
