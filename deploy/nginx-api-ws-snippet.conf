# Nginx: WebSocket path for FastAPI (no /api/v1 prefix)
#
# 1) Add this map ONCE inside the existing `http { ... }` block (e.g. in
#    /etc/nginx/nginx.conf, above any `include /etc/nginx/sites-enabled/*`):
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     ''      close;
# }
#
# 2) Inside your `server { server_name api.octobetiq.com; ... }` block, place
#    the `location /ws/` block *before* any catch-all `location /` that might
#    rewrite paths (e.g. proxy_pass .../api/v1/).

location /ws/ {
    # No path after port: forwards the full client URI (/ws/live/...) unchanged to uvicorn.
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    # Use a literal here if you have not defined map $http_upgrade $connection_upgrade in http {}.
    # Empty $connection_upgrade breaks the handshake and often yields HTTP 403 from upstream.
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}
