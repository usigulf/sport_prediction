# Nginx: Stripe return URLs for /payment/success and /payment/cancel
#
# Prereq: HTML files on disk (same as repo web/payment/*.html):
#   /var/www/octobetiq/payment/success.html
#   /var/www/octobetiq/payment/cancel.html
#
# Copy from repo (on server):
#   sudo mkdir -p /var/www/octobetiq/payment
#   sudo cp ~/sport_prediction/web/payment/success.html /var/www/octobetiq/payment/
#   sudo cp ~/sport_prediction/web/payment/cancel.html /var/www/octobetiq/payment/
#
# IMPORTANT: If apex (octobetiq.com) 301-redirects to www, you MUST repeat the same
# two `location =` blocks in the server{} block that handles https://www.octobetiq.com
# — otherwise curl -L ends in 404 on www.
#
# Paste the blocks below inside EACH relevant server block (often one for www and one
# for apex — or merge both server_names into one block if you use one vhost).

# Use root + rewrite (same root as site) instead of alias-to-file — avoids nginx
# alias edge cases with exact-match locations on some setups.
location = /payment/success {
    root /var/www/octobetiq;
    rewrite ^ /payment/success.html break;
    default_type text/html;
}

location = /payment/cancel {
    root /var/www/octobetiq;
    rewrite ^ /payment/cancel.html break;
    default_type text/html;
}
