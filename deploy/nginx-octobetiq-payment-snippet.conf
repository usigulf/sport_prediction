# Nginx: Stripe return URLs for https://octobetiq.com/payment/success and /payment/cancel
#
# Prereq: HTML files exist on disk (same content as repo web/payment/*.html):
#   /var/www/octobetiq/payment/success.html
#   /var/www/octobetiq/payment/cancel.html
#
# Copy from repo (on server):
#   sudo mkdir -p /var/www/octobetiq/payment
#   sudo cp ~/sport_prediction/web/payment/success.html /var/www/octobetiq/payment/
#   sudo cp ~/sport_prediction/web/payment/cancel.html /var/www/octobetiq/payment/
#
# Add the two `location =` blocks below INSIDE the existing
#   server { listen 443 ssl; server_name octobetiq.com www.octobetiq.com; ... }
# block (the site that serves your marketing / landing page — NOT api.octobetiq.com).

location = /payment/success {
    default_type text/html;
    alias /var/www/octobetiq/payment/success.html;
}

location = /payment/cancel {
    default_type text/html;
    alias /var/www/octobetiq/payment/cancel.html;
}
