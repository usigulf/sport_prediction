# Nginx: block /internal on Internet-facing API vhosts.
#
# Cron and ops scripts call http://127.0.0.1:8000/internal/* directly on the host.
# Public clients must not reach these routes even with a guessed X-Cron-Secret.
#
# Install:
#   sudo cp deploy/nginx-deny-internal-snippet.conf /etc/nginx/snippets/octobetiq-deny-internal.conf
#
# In api.octobetiq.com server { } — BEFORE any catch-all `location /`:
#   include /etc/nginx/snippets/octobetiq-deny-internal.conf;
#
# Or run: ./scripts/deploy_nginx_deny_internal.sh

location = /internal {
    return 403;
}

location ^~ /internal/ {
    return 403;
}

location = /metrics {
    return 403;
}
