# Nginx: proxy API + health + WebSocket from www.octobetiq.com to uvicorn (127.0.0.1:8000)
#
# Use case: https://www.octobetiq.com/api/v1/... and /health work the same as api.octobetiq.com
# (mobile can keep using https://api.octobetiq.com; this is for browsers, docs, or a single host).
#
# Prereq: the `map $http_upgrade $connection_upgrade` block in http {} (see deploy/nginx-api-ws-snippet.conf).
# Prereq: deploy/nginx-deny-internal-snippet.conf installed (defense in depth if a catch-all proxy is added).
#
# Install on server:
#   sudo cp deploy/nginx-octobetiq-www-api-proxy-snippet.conf /etc/nginx/snippets/octobetiq-www-proxy-api.conf
#
# In /etc/nginx/sites-available/octobetiq-web, inside the HTTPS `server { server_name www.octobetiq.com; ... }`
# block, add this line AFTER the /payment/* locations and BEFORE `location /`:
#
#   include /etc/nginx/snippets/octobetiq-www-proxy-api.conf;
#
# Then: sudo nginx -t && sudo systemctl reload nginx

include /etc/nginx/snippets/octobetiq-deny-internal.conf;

location /ws/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
}

location /api/ {
    proxy_pass http://127.0.0.1:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /health {
    proxy_pass http://127.0.0.1:8000/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location = /ready {
    proxy_pass http://127.0.0.1:8000/ready;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
