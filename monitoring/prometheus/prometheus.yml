global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'sport-prediction-monitor'

scrape_configs:
  # Backend API
  - job_name: 'sport-prediction-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # ML Inference Service
  - job_name: 'ml-inference'
    static_configs:
      - targets: ['ml-inference:8501']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # PostgreSQL (via postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # Redis (via redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
