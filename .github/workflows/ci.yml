name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Ruff
        run: ruff check app tests --ignore E501

      - name: pip-audit
        run: bash ../scripts/pip_audit_backend.sh

      - name: Bandit SAST
        run: bash ../scripts/bandit_backend.sh

      - name: Audit scaffold verify
        working-directory: ..
        run: bash scripts/verify_audit_scaffolds.sh

      - name: OpenAPI schema drift check
        working-directory: ..
        env:
          REDIS_URL: disabled
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
          ENVIRONMENT: development
          OPENAPI_DOCS_ENABLED: "true"
        run: python backend/scripts/export_openapi.py --check

      - name: Pytest with coverage
        env:
          DATABASE_URL: "sqlite:///:memory:"
          REDIS_URL: disabled
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
          ENVIRONMENT: test
          RATE_LIMIT_AUTH_PER_MINUTE: "1000"
          RATE_LIMIT_PREDICTIONS_PER_MINUTE: "1000"
        run: pytest tests -c ../pytest.ini --cov-fail-under=60 -m "not postgres"

  backend-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sportsprediction_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Postgres integration tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sportsprediction_test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sportsprediction_test
          REDIS_URL: disabled
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
          ENVIRONMENT: test
        run: pytest tests/test_postgres_integration.py -c ../pytest.ini --no-cov -m postgres

  mobile-typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install and typecheck
        run: |
          npm ci
          npx tsc --noEmit

      - name: OpenAPI TypeScript codegen drift check
        run: |
          npm run codegen:api
          git diff --exit-code -- src/types/api.generated.ts \
            || (echo "FAIL api.generated.ts drifted — run: cd mobile && npm run codegen:api" && exit 1)

      - name: Jest unit tests
        run: npm test -- --ci

      - name: npm audit
        run: npm audit --omit=dev --audit-level=high
