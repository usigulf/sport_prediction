<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>octobetiQ — Manage subscription</title>
  <style>
    :root { --bg: #0b1020; --text: #f1f5f9; --accent: #38bdf8; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { max-width: 32rem; border: 1px solid rgba(148,163,184,.2); border-radius: 12px; padding: 2rem; }
    h1 { font-size: 1.35rem; margin: 0 0 1rem; }
    p { color: #94a3b8; line-height: 1.55; }
    code { background: rgba(255,255,255,.06); padding: .15rem .35rem; border-radius: 4px; }
    .btn { display: inline-block; margin-top: 1rem; padding: .65rem 1.25rem; background: var(--accent); color: var(--bg); font-weight: 600; border-radius: 999px; text-decoration: none; border: none; cursor: pointer; }
    .err { color: #f87171; margin-top: 1rem; font-size: .9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Manage your subscription</h1>
    <p>Sign in with the same email you used in the octobetiQ app, then open the secure Stripe billing portal to update payment, cancel, or download invoices.</p>
    <p><label>Email <input id="email" type="email" style="width:100%;margin-top:.35rem;padding:.5rem;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#f1f5f9" /></label></p>
    <p><label>Password <input id="password" type="password" style="width:100%;margin-top:.35rem;padding:.5rem;border-radius:6px;border:1px solid #334155;background:#0f172a;color:#f1f5f9" /></label></p>
    <button class="btn" id="openPortal">Open billing portal</button>
    <p class="err" id="err" hidden></p>
    <p style="font-size:.8rem;margin-top:1.5rem;opacity:.7;">iOS subscribers can also use Settings → Apple ID → Subscriptions.</p>
  </div>
  <script>
    const API = 'https://api.octobetiq.com/api/v1';
    document.getElementById('openPortal').addEventListener('click', async () => {
      const err = document.getElementById('err');
      err.hidden = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      try {
        const login = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({ username: email, password }),
        });
        if (!login.ok) throw new Error('Invalid email or password');
        const { access_token } = await login.json();
        const portal = await fetch(`${API}/subscription/billing-portal`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${access_token}` },
        });
        if (!portal.ok) {
          const j = await portal.json().catch(() => ({}));
          throw new Error(j.detail || 'Billing portal unavailable — complete Stripe checkout in the app first.');
        }
        const { url } = await portal.json();
        window.location.href = url;
      } catch (e) {
        err.textContent = e.message || String(e);
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
