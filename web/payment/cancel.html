<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>octobetiQ — Checkout cancelled</title>
  <style>
    :root { --bg: #0b1020; --text: #f1f5f9; --muted: #94a3b8; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg); color: var(--text); padding: 1.5rem;
    }
    .card {
      max-width: 28rem; text-align: center;
      border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 12px; padding: 2rem;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
    p { margin: 0; color: var(--muted); font-size: 0.95rem; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Checkout cancelled</h1>
    <p>No charge was made. You can try again anytime from the <strong>octobetiQ</strong> app.</p>
  </div>
</body>
</html>
