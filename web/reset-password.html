<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — OctobetiQ</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0A1428;
      color: #fff;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    a { color: #00FF9F; }
  </style>
</head>
<body>
  <div>
    <h1>Opening OctobetiQ…</h1>
    <p id="status">Redirecting to the app to finish resetting your password.</p>
    <p><a id="fallback" href="#">Tap here if the app does not open</a></p>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var token = params.get('token') || '';
      if (!token) {
        document.getElementById('status').textContent =
          'This reset link is missing a token. Request a new reset from the OctobetiQ app.';
        document.getElementById('fallback').style.display = 'none';
        return;
      }
      var appUrl = 'com.sportsprediction.app://reset-password?token=' + encodeURIComponent(token);
      var fallback = document.getElementById('fallback');
      fallback.href = appUrl;
      window.location.replace(appUrl);
      setTimeout(function () {
        document.getElementById('status').textContent =
          'If nothing happened, open OctobetiQ and use the link below.';
      }, 1500);
    })();
  </script>
</body>
</html>
