services:
  # PostgreSQL with TimescaleDB
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: sport-prediction-postgres
    # Raise ceiling so API pool(s) + Grafana/metrics + one-off scripts do not hit "too many clients".
    command: ["postgres", "-c", "max_connections=150"]
    environment:
      POSTGRES_USER: postgres
      # Only applied on first volume init; existing data keeps the old password until ALTER USER.
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sportsprediction
    ports:
      # Never publish Postgres on 0.0.0.0 — scanners bruteforce and run exploit SQL (see server logs).
      # API/redis reach postgres on the Docker network without host ports. Admin: docker compose exec postgres psql …
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sport-prediction-network

  # Redis — set REDIS_PASSWORD in .env (required in production via docker-compose.prod.yml).
  redis:
    image: redis:7-alpine
    container_name: sport-prediction-redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    command:
      - sh
      - -c
      - |
        if [ -n "$$REDIS_PASSWORD" ]; then
          exec redis-server --appendonly yes --requirepass "$$REDIS_PASSWORD"
        else
          exec redis-server --appendonly yes
        fi
    healthcheck:
      test:
        - CMD-SHELL
        - |
          if [ -n "$$REDIS_PASSWORD" ]; then
            redis-cli -a "$$REDIS_PASSWORD" --no-auth-warning ping | grep -q PONG
          else
            redis-cli ping | grep -q PONG
          fi
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sport-prediction-network

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sport-prediction-api
    # Later file wins: .env overrides .env.production (use .env for machine-only secrets like Stripe).
    # Compose ${VAR} substitution only reads .env — .env.production is ignored unless listed here or you use docker compose --env-file.
    env_file:
      - path: .env.production
        required: false
      - path: .env
        required: false
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/sportsprediction
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      # Set JWT_SECRET in project .env (min ~32 chars). Rotating logs everyone out.
      # Same default as backend Settings; production must override (see docker-compose.prod.yml).
      JWT_SECRET: ${JWT_SECRET:-dev-secret-key-change-in-production-minimum-32-characters-long}
      CORS_ORIGINS: '["http://localhost:3000","http://localhost:19006"]'
      OPENAPI_DOCS_ENABLED: "false"
      LOG_LEVEL: INFO
      # Sklearn pickles for predictions (train: backend/train_model.py or scripts/cron/internal_train_model.sh)
      EXPLANATION_MODEL_DIR: /models
      # Required for `--profile predictions` schedulers and any /internal cron calls. Empty = cron returns 501 (safe default; no weak placeholder).
      PUSH_CRON_SECRET: ${PUSH_CRON_SECRET:-}
      # Stripe: passed via Compose substitution from project-root .env (same file as POSTGRES_PASSWORD).
      # If unset here, env_file can still supply them unless an empty key in another file overrides.
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRICE_ID_PREMIUM: ${STRIPE_PRICE_ID_PREMIUM:-}
      STRIPE_PRICE_ID_PREMIUM_ANNUAL: ${STRIPE_PRICE_ID_PREMIUM_ANNUAL:-}
      STRIPE_PRICE_ID_PREMIUM_PLUS: ${STRIPE_PRICE_ID_PREMIUM_PLUS:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Sportradar: set in .env and/or .env.production (see env_file above), not only .env.production with compose substitution.
    # Bind to loopback so host nginx can proxy; not exposed on the public interface.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app
      - ./scripts:/app/scripts
      - ./ml/models:/models:ro
      - /app/venv  # Exclude venv from volume
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    networks:
      - sport-prediction-network

  # Optional: refresh DB predictions on an interval (docker compose --profile predictions up -d)
  prediction-scheduler:
    image: curlimages/curl:8.5.0
    container_name: sport-prediction-prediction-scheduler
    environment:
      # Same value as api PUSH_CRON_SECRET in .env; empty curls get 401/501 from /internal/*
      PUSH_CRON_SECRET: ${PUSH_CRON_SECRET:-}
      API_INTERNAL_URL: http://api:8000
    # curl image ENTRYPOINT is ["curl"] — override with sh -c. One line only (multiline YAML breaks || parsing).
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do curl -sS -X POST "$$API_INTERNAL_URL/internal/predictions/run" -H "Content-Type: application/json" -H "X-Cron-Secret: $$PUSH_CRON_SECRET" -d "{}"; sleep 900; done'
    depends_on:
      - api
    networks:
      - sport-prediction-network
    profiles:
      - predictions

  # Sportradar PL/UCL schedule import (~3x/day). Same profile as prediction-scheduler.
  soccer-schedule-sync:
    image: curlimages/curl:8.5.0
    container_name: sport-prediction-soccer-schedule-sync
    environment:
      PUSH_CRON_SECRET: ${PUSH_CRON_SECRET:-}
      API_INTERNAL_URL: http://api:8000
    entrypoint: ["/bin/sh", "-c"]
    command:
      - 'while true; do curl -sS -X POST "$$API_INTERNAL_URL/internal/soccer/sync-schedules" -H "X-Cron-Secret: $$PUSH_CRON_SECRET"; sleep 28800; done'
    depends_on:
      - api
    networks:
      - sport-prediction-network
    profiles:
      - predictions

  # Prometheus (Monitoring) — enable with: docker compose --profile monitoring up -d
  prometheus:
    image: prom/prometheus:latest
    container_name: sport-prediction-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sport-prediction-network
    profiles:
      - monitoring

  # Grafana (Visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: sport-prediction-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - sport-prediction-network
    profiles:
      - monitoring

  # Kafka — not used by API; enable only if experimenting locally
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: sport-prediction-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sport-prediction-network
    profiles:
      - unused

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: sport-prediction-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - sport-prediction-network
    profiles:
      - unused

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  sport-prediction-network:
    driver: bridge
